name: Mobile Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  APPIUM_PORT: 4723
  ANDROID_AVD: test_avd

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  smoke-tests:
    name: Smoke Tests (Android)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create required directories
        run: mkdir -p apps screenshots

      - name: Download demo app APK
        run: |
          curl -L -o apps/android.wdio.native.app.v2.0.0.apk \
            "https://github.com/webdriverio/native-demo-app/releases/download/v2.0.0/android.wdio.native.app.v2.0.0.apk"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-31-google_apis-x86_64

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          avd-name: ${{ env.ANDROID_AVD }}
          force-avd-creation: false
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Start Appium server
        run: |
          nohup npx appium \
            --port=$APPIUM_PORT \
            --address=127.0.0.1 \
            --allow-insecure chromedriver_autodownload \
            --log-no-colors \
            2>&1 > appium.log &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:$APPIUM_PORT/status > /dev/null 2>&1; then
              echo "Appium is ready"
              break
            fi
            echo "Waiting for Appium... ($i/30)"
            sleep 2
          done

      - name: Run Android smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          avd-name: ${{ env.ANDROID_AVD }}
          force-avd-creation: false
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            npm run android:smoke
            TEST_EXIT=$?

            # Mata o emulador antes do "Terminate Emulator" do android-emulator-runner
            # para evitar que trave. adb emu kill é suficiente.
            adb emu kill 2>/dev/null || true
            sleep 5

            exit $TEST_EXIT

      - name: Upload appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-smoke
          path: appium.log
          retention-days: 7

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-smoke
          path: screenshots/
          retention-days: 7

  regression-tests:
    name: Regression Tests (Android)
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create required directories
        run: mkdir -p apps screenshots

      - name: Download demo app APK
        run: |
          curl -L -o apps/android.wdio.native.app.v2.0.0.apk \
            "https://github.com/webdriverio/native-demo-app/releases/download/v2.0.0/android.wdio.native.app.v2.0.0.apk"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-31-google_apis-x86_64

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          avd-name: ${{ env.ANDROID_AVD }}
          force-avd-creation: false
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Start Appium server
        run: |
          nohup npx appium \
            --port=$APPIUM_PORT \
            --address=127.0.0.1 \
            --allow-insecure chromedriver_autodownload \
            --log-no-colors \
            2>&1 > appium.log &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:$APPIUM_PORT/status > /dev/null 2>&1; then
              echo "Appium is ready"
              break
            fi
            echo "Waiting for Appium... ($i/30)"
            sleep 2
          done

      - name: Run full Android test suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          avd-name: ${{ env.ANDROID_AVD }}
          force-avd-creation: false
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            npm run android
            TEST_EXIT=$?

            adb emu kill 2>/dev/null || true
            sleep 5

            exit $TEST_EXIT

      - name: Upload appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-regression
          path: appium.log
          retention-days: 30

      - name: Generate Allure report
        if: always()
        run: npm run report:generate

      - name: Upload allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-regression
          path: screenshots/
          retention-days: 30
